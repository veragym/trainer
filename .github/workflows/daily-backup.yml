name: Supabase 자동 백업

on:
  schedule:
    - cron: '0 20 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: 레포 체크아웃
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 의존성 설치
        run: pip install requests

      - name: 백업 실행
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python backup/run_backup.py

      - name: 백업 파일 커밋
        run: |
          git config user.name  "veragym-backup-bot"
          git config user.email "backup@veragym.kr"
          git add backup/data/
          git diff --staged --quiet || git commit -m "🗄️ 자동 백업 $(date '+%Y-%m-%d %H:%M KST')"
          git push
