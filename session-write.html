<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>베라짐 트레이너 | 수업 일지</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, 'Pretendard', 'Apple SD Gothic Neo', sans-serif;
    background: #0f0f0f; color: #fff;
    min-height: 100dvh; padding-bottom: 120px;
  }

  /* ─── 헤더 ─── */
  .header {
    background: #1a1a1a; border-bottom: 1px solid #2a2a2a;
    padding: 14px 16px;
    display: flex; align-items: center; gap: 12px;
    position: sticky; top: 0; z-index: 100;
  }
  .btn-back { background: none; border: none; color: #4ade80; font-size: 22px; cursor: pointer; }
  .header-info { flex: 1; }
  .header-info .member-nm { font-size: 16px; font-weight: 700; }
  .header-info .sess-meta { font-size: 12px; color: #666; margin-top: 2px; }
  .btn-save-top {
    background: #4ade80; color: #000; border: none;
    border-radius: 10px; padding: 8px 16px;
    font-size: 13px; font-weight: 700; cursor: pointer;
  }
  .btn-save-top:disabled { opacity: 0.4; }

  /* ─── 수업 메타 ─── */
  .meta-bar {
    background: #161616; padding: 12px 16px;
    display: flex; gap: 10px; border-bottom: 1px solid #222; overflow-x: auto;
  }
  .meta-chip {
    background: #222; border-radius: 8px; padding: 6px 12px;
    font-size: 12px; color: #aaa; white-space: nowrap;
    display: flex; align-items: center; gap: 6px; border: 1px solid #2a2a2a;
  }
  .meta-chip input {
    background: none; border: none; color: #fff;
    font-size: 12px; outline: none; font-family: inherit;
  }
  .meta-chip input[type=number] { width: 44px; text-align: center; }
  .meta-chip input[type=date]   { width: 124px; }

  /* ─── 운동 카드 ─── */
  .ex-list { padding: 16px 16px 0; }
  .ex-card {
    background: #1a1a1a; border: 1px solid #2a2a2a;
    border-radius: 16px; margin-bottom: 12px; overflow: hidden;
  }
  .ex-card-head {
    display: flex; align-items: center; padding: 14px 16px; gap: 10px;
  }
  .ex-order {
    width: 26px; height: 26px; border-radius: 50%; background: #2a2a2a;
    color: #888; display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700; flex-shrink: 0;
  }

  /* 운동 사진 썸네일 */
  .ex-photos { display: flex; gap: 4px; flex-shrink: 0; }
  .ex-photo {
    width: 40px; height: 40px; border-radius: 8px; object-fit: cover;
    border: 1px solid #333;
  }
  .ex-photo-empty {
    width: 40px; height: 40px; border-radius: 8px;
    background: #222; border: 1px dashed #333;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; color: #444;
  }

  .ex-name-wrap { flex: 1; min-width: 0; }
  .ex-name { font-size: 15px; font-weight: 700; }
  .ex-sub { font-size: 11px; color: #555; margin-top: 2px; }
  .ex-set-cnt { font-size: 12px; color: #4ade80; flex-shrink: 0; }
  .btn-del-ex { background: none; border: none; color: #333; font-size: 20px; cursor: pointer; flex-shrink: 0; }
  .btn-del-ex:hover { color: #f87171; }

  /* ─── 세트 ─── */
  .sets-area { padding: 0 16px 14px; }
  .sets-header {
    display: grid; grid-template-columns: 34px 1fr 1fr 36px;
    gap: 6px; margin-bottom: 6px;
    font-size: 11px; color: #555; text-align: center; padding: 0 2px;
  }
  .set-row {
    display: grid; grid-template-columns: 34px 1fr 1fr 36px;
    gap: 6px; align-items: center; margin-bottom: 6px;
  }
  .set-num {
    background: #222; border-radius: 8px; font-size: 12px; color: #666;
    font-weight: 700; display: flex; align-items: center; justify-content: center; height: 40px;
  }
  .set-input {
    background: #111; border: 1.5px solid #2a2a2a; border-radius: 8px;
    padding: 0 10px; font-size: 15px; color: #fff; outline: none;
    text-align: center; width: 100%; height: 40px; font-family: inherit;
    transition: border-color 0.2s;
  }
  .set-input:focus { border-color: #4ade80; }
  .btn-del-set { background: none; border: none; color: #333; font-size: 18px; cursor: pointer; text-align: center; height: 40px; }
  .btn-del-set:hover { color: #f87171; }
  .btn-add-set {
    background: #1f1f1f; border: 1px dashed #333; border-radius: 8px;
    color: #555; font-size: 13px; padding: 9px; width: 100%; cursor: pointer; margin-top: 4px;
    transition: all 0.2s;
  }
  .btn-add-set:hover { border-color: #4ade80; color: #4ade80; }

  /* 코멘트 */
  .ex-comment { padding: 0 16px 14px; }
  .ex-comment textarea {
    width: 100%; background: #111; border: 1.5px solid #222;
    border-radius: 8px; padding: 10px 12px; font-size: 13px; color: #aaa;
    outline: none; font-family: inherit; resize: none; height: 58px;
    transition: border-color 0.2s;
  }
  .ex-comment textarea:focus { border-color: #4ade80; color: #fff; }

  /* ─── 빈 상태 ─── */
  .ex-empty {
    text-align: center; padding: 40px 20px; color: #444;
  }
  .ex-empty-icon { font-size: 40px; margin-bottom: 10px; }

  /* ─── 운동 추가 버튼 ─── */
  .btn-add-ex-wrap { padding: 0 16px; margin-top: 4px; }
  .btn-add-ex {
    width: 100%; background: #1a1a1a; border: 1.5px dashed #333;
    border-radius: 14px; padding: 20px; font-size: 15px; color: #555;
    cursor: pointer; transition: all 0.2s;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .btn-add-ex:hover { border-color: #4ade80; color: #4ade80; }

  /* ─── 총평 ─── */
  .notes-wrap { padding: 16px; }
  .notes-label { font-size: 12px; color: #666; margin-bottom: 6px; }
  .notes-textarea {
    width: 100%; background: #1a1a1a; border: 1.5px solid #2a2a2a;
    border-radius: 12px; padding: 14px; font-size: 14px; color: #fff;
    outline: none; font-family: inherit; resize: vertical; min-height: 80px;
    transition: border-color 0.2s;
  }
  .notes-textarea:focus { border-color: #4ade80; }

  /* ─── 모달 공통 ─── */
  .modal-bg {
    display: none; position: fixed; inset: 0;
    background: #000000dd; z-index: 200; flex-direction: column;
  }
  .modal-bg.open { display: flex; }
  .modal-dimmer { flex: 1; }
  .modal-sheet {
    background: #1a1a1a; border-radius: 24px 24px 0 0;
    width: 100%; max-width: 480px; margin: 0 auto;
    max-height: 92dvh; display: flex; flex-direction: column;
    animation: slideUp 0.22s ease;
  }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  .modal-handle { width: 36px; height: 4px; background: #333; border-radius: 99px; margin: 14px auto 0; flex-shrink: 0; }

  /* ─── 운동 검색 모달 ─── */
  .search-head {
    padding: 14px 16px 10px; border-bottom: 1px solid #222; flex-shrink: 0;
  }
  .search-head h3 { font-size: 16px; font-weight: 700; margin-bottom: 10px; }
  .search-box {
    display: flex; align-items: center; gap: 8px;
    background: #111; border: 1.5px solid #333; border-radius: 10px; padding: 10px 14px;
    margin-bottom: 0;
  }
  .search-icon { color: #555; font-size: 16px; }
  .search-input {
    background: none; border: none; outline: none;
    color: #fff; font-size: 15px; flex: 1; font-family: inherit;
  }
  .search-input::placeholder { color: #444; }
  .btn-x { background: none; border: none; color: #555; font-size: 18px; cursor: pointer; }

  .search-results { flex: 1; overflow-y: auto; padding: 6px 0; }

  /* 검색 결과 아이템 */
  .result-item {
    display: flex; align-items: center; padding: 10px 16px;
    cursor: pointer; gap: 12px; border-bottom: 1px solid #1f1f1f;
    transition: background 0.1s;
  }
  .result-item:hover { background: #222; }
  .result-photos { display: flex; gap: 3px; flex-shrink: 0; }
  .result-photo { width: 36px; height: 36px; border-radius: 6px; object-fit: cover; border: 1px solid #333; }
  .result-photo-ph {
    width: 36px; height: 36px; border-radius: 6px;
    background: #222; border: 1px dashed #333;
    display: flex; align-items: center; justify-content: center; font-size: 13px;
  }
  .result-info { flex: 1; min-width: 0; }
  .result-name { font-size: 14px; font-weight: 600; }
  .result-meta { font-size: 11px; color: #555; margin-top: 2px; }
  .result-use { font-size: 11px; color: #4ade80; }

  /* 새 운동 만들기 버튼 */
  .btn-new-ex {
    margin: 10px 16px; background: #0f2a1a;
    border: 1.5px dashed #4ade8055; border-radius: 12px;
    padding: 14px; color: #4ade80; font-size: 14px; font-weight: 600;
    cursor: pointer; text-align: center; transition: all 0.2s;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .btn-new-ex:hover { background: #0f3a22; border-color: #4ade80; }

  /* 빈 검색 결과 */
  .search-empty { text-align: center; padding: 32px 20px; color: #444; font-size: 14px; }

  /* ─── 새 운동 만들기 모달 ─── */
  .new-ex-body { padding: 16px; flex: 1; overflow-y: auto; }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 12px; color: #888; margin-bottom: 6px; font-weight: 500; }
  .field input, .field select {
    width: 100%; background: #111; border: 1.5px solid #333;
    border-radius: 10px; padding: 12px 14px;
    font-size: 14px; color: #fff; outline: none; font-family: inherit;
    transition: border-color 0.2s;
  }
  .field input:focus, .field select:focus { border-color: #4ade80; }
  .field input::placeholder { color: #444; }
  .field .hint { font-size: 11px; color: #555; margin-top: 5px; }

  /* 사진 업로드 */
  .photo-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .photo-slot {
    aspect-ratio: 1; border-radius: 12px;
    background: #111; border: 1.5px dashed #333;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    cursor: pointer; position: relative; overflow: hidden;
    transition: border-color 0.2s;
  }
  .photo-slot:hover { border-color: #4ade80; }
  .photo-slot img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
  .photo-slot .slot-label { font-size: 12px; color: #555; margin-top: 6px; position: relative; z-index: 1; }
  .photo-slot .slot-icon { font-size: 28px; position: relative; z-index: 1; }
  .photo-slot .btn-clear-photo {
    position: absolute; top: 6px; right: 6px; z-index: 2;
    background: #000000aa; border: none; border-radius: 50%;
    width: 22px; height: 22px; color: #fff; font-size: 12px;
    cursor: pointer; display: none; align-items: center; justify-content: center;
  }
  .photo-slot.has-img .btn-clear-photo { display: flex; }
  .photo-slot.has-img .slot-icon, .photo-slot.has-img .slot-label { display: none; }
  input[type=file] { display: none; }

  /* 모달 버튼 */
  .modal-btns { display: flex; gap: 10px; padding: 14px 16px 28px; flex-shrink: 0; }
  .btn-cancel { flex: 1; background: #2a2a2a; border: none; border-radius: 12px; padding: 14px; font-size: 15px; color: #aaa; cursor: pointer; font-weight: 600; }
  .btn-confirm { flex: 2; background: #4ade80; border: none; border-radius: 12px; padding: 14px; font-size: 15px; color: #000; font-weight: 700; cursor: pointer; }
  .btn-confirm:disabled { opacity: 0.4; }

  /* ─── 토스트 ─── */
  .toast {
    position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
    background: #333; color: #fff; border-radius: 10px;
    padding: 10px 18px; font-size: 13px; font-weight: 600;
    opacity: 0; pointer-events: none; transition: opacity 0.3s;
    z-index: 999; white-space: nowrap;
  }
</style>
</head>
<body>

<!-- 헤더 -->
<div class="header">
  <button class="btn-back" onclick="goBack()">←</button>
  <div class="header-info">
    <div class="member-nm" id="hdrMember">회원</div>
    <div class="sess-meta" id="hdrMeta">수업 일지</div>
  </div>
  <button class="btn-save-top" id="btnSave" onclick="saveSession()">저장</button>
</div>

<!-- 수업 메타 -->
<div class="meta-bar">
  <div class="meta-chip">📅 <input type="date" id="metaDate"></div>
  <div class="meta-chip">🔢 <input type="number" id="metaNum" placeholder="회차" min="1">회차</div>
</div>

<!-- 운동 카드 목록 -->
<div id="exList" class="ex-list"></div>

<!-- 운동 추가 버튼 -->
<div class="btn-add-ex-wrap">
  <button class="btn-add-ex" onclick="openSearch()">＋ 운동 추가</button>
</div>

<!-- 총평 -->
<div class="notes-wrap">
  <div class="notes-label">수업 총평 / 메모</div>
  <textarea class="notes-textarea" id="notesInput" placeholder="오늘 수업 피드백, 특이사항..."></textarea>
</div>

<div id="toast" class="toast"></div>

<!-- ══════════════════════════════════════
     운동 검색 모달
══════════════════════════════════════ -->
<div id="searchModal" class="modal-bg">
  <div class="modal-dimmer" onclick="closeSearch()"></div>
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="search-head">
      <h3>운동 선택</h3>
      <div class="search-box">
        <span class="search-icon">🔍</span>
        <input type="text" class="search-input" id="searchInput"
               placeholder="운동 이름 검색..." oninput="onSearch(this.value)" autocomplete="off">
        <button class="btn-x" onclick="document.getElementById('searchInput').value='';onSearch('')">✕</button>
      </div>
    </div>

    <!-- 새 운동 만들기 버튼 (항상 상단 노출) -->
    <button class="btn-new-ex" onclick="openNewEx()">
      ✦ 새 운동 만들기
    </button>

    <div class="search-results" id="searchResults">
      <div class="search-empty" style="color:#555;padding-top:16px">운동 이름을 검색하거나<br>새 운동을 만들어보세요</div>
    </div>
  </div>
</div>

<!-- ══════════════════════════════════════
     새 운동 만들기 모달
══════════════════════════════════════ -->
<div id="newExModal" class="modal-bg">
  <div class="modal-dimmer" onclick="closeNewEx()"></div>
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="new-ex-body">
      <h3 style="font-size:16px;font-weight:700;margin-bottom:18px">새 운동 만들기</h3>

      <div class="field">
        <label>운동 이름 <span style="color:#f87171">*</span></label>
        <input type="text" id="newExName" placeholder="예: 체스트프레스" maxlength="40">
      </div>

      <div class="field">
        <label>운동 부위 <span style="color:#555;font-weight:400">(선택)</span></label>
        <input type="text" id="newExBody" placeholder="예: 가슴, 삼두">
        <div class="hint">트레이너 본인의 기준으로 자유롭게 입력</div>
      </div>

      <div class="field">
        <label>기구/카테고리 <span style="color:#555;font-weight:400">(선택)</span></label>
        <input type="text" id="newExCat" placeholder="예: 머신, 덤벨, 맨몸">
      </div>

      <div class="field">
        <label>운동 사진 <span style="color:#555;font-weight:400">(선택 — 나중에 추가 가능)</span></label>
        <div class="photo-row">
          <!-- 사진 1 -->
          <div class="photo-slot" id="slot1" onclick="triggerFile(1)">
            <span class="slot-icon">📷</span>
            <span class="slot-label">시작 자세</span>
            <button class="btn-clear-photo" onclick="event.stopPropagation();clearPhoto(1)">✕</button>
          </div>
          <!-- 사진 2 -->
          <div class="photo-slot" id="slot2" onclick="triggerFile(2)">
            <span class="slot-icon">📷</span>
            <span class="slot-label">끝 자세</span>
            <button class="btn-clear-photo" onclick="event.stopPropagation();clearPhoto(2)">✕</button>
          </div>
        </div>
        <!-- hidden file inputs -->
        <input type="file" id="file1" accept="image/*" onchange="onPhotoSelected(1,this)">
        <input type="file" id="file2" accept="image/*" onchange="onPhotoSelected(2,this)">
      </div>
    </div>

    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeNewEx()">취소</button>
      <button class="btn-confirm" id="btnSaveEx" onclick="saveNewEx()">저장 후 추가</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script>
init_db();

// ─── 상태 ───
let trainer    = null;
let session    = null;
let exercises  = [];        // 현재 세션에 추가된 운동 목록
let myLibrary  = [];        // 내 운동 라이브러리 캐시
let newPhoto1  = null;      // 새 운동 사진 파일 1
let newPhoto2  = null;      // 새 운동 사진 파일 2
let searchTm   = null;

// ─── 초기화 ───
async function init() {
  trainer = await requireTrainer();
  if (!trainer) return;

  const params    = new URLSearchParams(location.search);
  const sessionId = params.get('session');
  if (!sessionId) { showToast('세션 정보가 없습니다'); return; }

  // 세션 로드
  const { data: sess, error } = await db
    .from('pt_sessions')
    .select('*, members(name)')
    .eq('id', sessionId)
    .single();

  if (error || !sess) { showToast('세션을 불러올 수 없습니다'); return; }
  session = sess;

  document.getElementById('hdrMember').textContent  = sess.members?.name || '회원';
  document.getElementById('hdrMeta').textContent    = fmtDate(sess.session_date) + (sess.session_number ? ` · ${sess.session_number}회차` : '');
  document.getElementById('metaDate').value         = sess.session_date || new Date().toISOString().slice(0,10);
  document.getElementById('metaNum').value          = sess.session_number || '';
  document.getElementById('notesInput').value       = sess.notes || '';

  // 기존 운동 로드
  const { data: exRows } = await db
    .from('session_exs')
    .select('*')
    .eq('session_id', sessionId)
    .order('order_num');

  exercises = (exRows || []).map(r => ({
    rowId:   r.id,
    exId:    r.exercise_id,
    name:    r.exercise_name,
    bodyPart: '',
    category: '',
    img1:    r.image_url_1,
    img2:    r.image_url_2,
    sets:    Array.isArray(r.sets) ? r.sets : [{ set:1, weight:0, reps:10 }],
    comment: r.trainer_comment || '',
  }));
  renderExercises();

  // 내 라이브러리 백그라운드 로드
  loadMyLibrary();
}

// ─── 내 운동 라이브러리 로드 (전체, use_count 순) ───
async function loadMyLibrary() {
  const { data } = await db
    .from('exercises_lib')
    .select('id, name, body_part, category, image_url_1, image_url_2, use_count')
    .eq('trainer_id', trainer.id)
    .order('use_count', { ascending: false })
    .limit(500);
  myLibrary = data || [];
}

// ─── 운동 렌더 ───
function renderExercises() {
  const wrap = document.getElementById('exList');
  if (!exercises.length) {
    wrap.innerHTML = `<div class="ex-empty"><div class="ex-empty-icon">🏋️</div>아래 버튼으로 운동을 추가해보세요</div>`;
    return;
  }
  wrap.innerHTML = exercises.map((ex, i) => `
    <div class="ex-card">
      <div class="ex-card-head">
        <div class="ex-order">${i+1}</div>
        <div class="ex-photos">
          ${ex.img1
            ? `<img class="ex-photo" src="${ex.img1}" alt="시작">`
            : `<div class="ex-photo-empty">📷</div>`}
          ${ex.img2
            ? `<img class="ex-photo" src="${ex.img2}" alt="끝">`
            : `<div class="ex-photo-empty">📷</div>`}
        </div>
        <div class="ex-name-wrap">
          <div class="ex-name">${ex.name}</div>
          <div class="ex-sub">${[ex.bodyPart, ex.category].filter(Boolean).join(' · ') || ''}</div>
        </div>
        <div class="ex-set-cnt">${ex.sets.length}세트</div>
        <button class="btn-del-ex" onclick="removeEx(${i})">×</button>
      </div>

      <div class="sets-area">
        <div class="sets-header"><span>세트</span><span>무게(kg)</span><span>횟수</span><span></span></div>
        ${ex.sets.map((s, si) => `
          <div class="set-row">
            <div class="set-num">${s.set}</div>
            <input class="set-input" type="number" step="0.5" min="0" value="${s.weight}"
                   onchange="updSet(${i},${si},'weight',this.value)">
            <input class="set-input" type="number" min="1" value="${s.reps}"
                   onchange="updSet(${i},${si},'reps',this.value)">
            <button class="btn-del-set" onclick="delSet(${i},${si})">−</button>
          </div>
        `).join('')}
        <button class="btn-add-set" onclick="addSet(${i})">+ 세트 추가</button>
      </div>

      <div class="ex-comment">
        <textarea placeholder="이 운동 코멘트 (선택)"
                  onchange="updComment(${i},this.value)">${ex.comment}</textarea>
      </div>
    </div>
  `).join('');
}

// ─── 세트 조작 ───
function addSet(idx) {
  const last = exercises[idx].sets.at(-1) || { weight:0, reps:10 };
  exercises[idx].sets.push({ set: exercises[idx].sets.length + 1, weight: last.weight, reps: last.reps });
  renderExercises();
}
function delSet(idx, si) {
  exercises[idx].sets.splice(si, 1);
  exercises[idx].sets.forEach((s, i) => { s.set = i + 1; });
  renderExercises();
}
function updSet(idx, si, field, val) {
  exercises[idx].sets[si][field] = field === 'weight' ? parseFloat(val)||0 : parseInt(val)||0;
}
function updComment(idx, val) { exercises[idx].comment = val; }
function removeEx(idx) {
  if (!confirm(`'${exercises[idx].name}' 삭제?`)) return;
  exercises.splice(idx, 1);
  renderExercises();
}

// ─── 저장 ───
async function saveSession() {
  if (!session) return;
  const btn = document.getElementById('btnSave');
  btn.disabled = true; btn.textContent = '저장 중...';
  try {
    // 1. 메타 업데이트
    await db.from('pt_sessions').update({
      session_date:   document.getElementById('metaDate').value,
      session_number: parseInt(document.getElementById('metaNum').value) || null,
      notes:          document.getElementById('notesInput').value || null,
    }).eq('id', session.id);

    // 2. 운동 전체 삭제 후 재삽입 (순서 보장)
    await db.from('session_exs').delete().eq('session_id', session.id);
    if (exercises.length) {
      await db.from('session_exs').insert(
        exercises.map((ex, i) => ({
          session_id:      session.id,
          exercise_id:     ex.exId || null,
          exercise_name:   ex.name,
          image_url_1:     ex.img1 || null,
          image_url_2:     ex.img2 || null,
          order_num:       i,
          sets:            ex.sets,
          trainer_comment: ex.comment || null,
        }))
      );
    }
    showToast('저장 완료 ✓');
    btn.textContent = '저장됨 ✓';
    setTimeout(() => { btn.disabled = false; btn.textContent = '저장'; }, 2200);
  } catch (e) {
    showToast('저장 실패: ' + e.message);
    btn.disabled = false; btn.textContent = '저장';
  }
}

// ─── 검색 모달 ───
function openSearch() {
  document.getElementById('searchModal').classList.add('open');
  setTimeout(() => document.getElementById('searchInput').focus(), 200);
  renderSearchResults('');
}
function closeSearch() {
  document.getElementById('searchModal').classList.remove('open');
  document.getElementById('searchInput').value = '';
}
function onSearch(q) {
  clearTimeout(searchTm);
  searchTm = setTimeout(() => renderSearchResults(q), 150);
}

function renderSearchResults(q) {
  const wrap = document.getElementById('searchResults');

  // 라이브러리 로딩 중
  if (!myLibrary.length && !q) {
    wrap.innerHTML = `<div class="search-empty">아직 만든 운동이 없어요.<br>위 버튼으로 첫 운동을 만들어보세요 🏋️</div>`;
    return;
  }

  let list = myLibrary;
  if (q.trim()) {
    const kw = q.trim().toLowerCase();
    list = myLibrary.filter(e => e.name.toLowerCase().includes(kw));
  }

  if (!list.length) {
    wrap.innerHTML = `<div class="search-empty">"${q}" 운동이 없어요.<br>새 운동 만들기로 추가해보세요</div>`;
    return;
  }

  wrap.innerHTML = list.slice(0, 60).map(ex => `
    <div class="result-item" onclick="selectEx(${ex.id})">
      <div class="result-photos">
        ${ex.image_url_1
          ? `<img class="result-photo" src="${ex.image_url_1}">`
          : `<div class="result-photo-ph">📷</div>`}
        ${ex.image_url_2
          ? `<img class="result-photo" src="${ex.image_url_2}">`
          : `<div class="result-photo-ph">📷</div>`}
      </div>
      <div class="result-info">
        <div class="result-name">${ex.name}</div>
        <div class="result-meta">${[ex.body_part, ex.category].filter(Boolean).join(' · ')}</div>
      </div>
      ${ex.use_count > 0 ? `<div class="result-use">${ex.use_count}회</div>` : ''}
    </div>
  `).join('');
}

function selectEx(libId) {
  const ex = myLibrary.find(e => e.id === libId);
  if (!ex) return;
  exercises.push({
    rowId: null, exId: libId,
    name: ex.name, bodyPart: ex.body_part || '', category: ex.category || '',
    img1: ex.image_url_1, img2: ex.image_url_2,
    sets: [{ set:1, weight:0, reps:10 }],
    comment: '',
  });
  renderExercises();
  closeSearch();
  setTimeout(() => {
    document.querySelectorAll('.ex-card').at(-1)?.scrollIntoView({ behavior:'smooth', block:'center' });
  }, 100);
}

// ─── 새 운동 만들기 모달 ───
function openNewEx() {
  document.getElementById('newExName').value  = document.getElementById('searchInput').value;
  document.getElementById('newExBody').value  = '';
  document.getElementById('newExCat').value   = '';
  newPhoto1 = null; newPhoto2 = null;
  clearSlotUI(1); clearSlotUI(2);
  document.getElementById('newExModal').classList.add('open');
  setTimeout(() => document.getElementById('newExName').focus(), 200);
}
function closeNewEx() {
  document.getElementById('newExModal').classList.remove('open');
}

// 사진 슬롯
function triggerFile(num) { document.getElementById(`file${num}`).click(); }
async function onPhotoSelected(num, input) {
  if (!input.files[0]) return;
  const compressed = await compressImage(input.files[0]);
  if (num === 1) newPhoto1 = compressed; else newPhoto2 = compressed;
  const url = URL.createObjectURL(compressed);
  const slot = document.getElementById(`slot${num}`);
  let img = slot.querySelector('img');
  if (!img) { img = document.createElement('img'); slot.appendChild(img); }
  img.src = url;
  slot.classList.add('has-img');
}
function clearPhoto(num) {
  if (num === 1) newPhoto1 = null; else newPhoto2 = null;
  document.getElementById(`file${num}`).value = '';
  clearSlotUI(num);
}
function clearSlotUI(num) {
  const slot = document.getElementById(`slot${num}`);
  const img  = slot.querySelector('img');
  if (img) img.remove();
  slot.classList.remove('has-img');
}

// 새 운동 저장
async function saveNewEx() {
  const name = document.getElementById('newExName').value.trim();
  if (!name) { showToast('운동 이름을 입력해주세요'); return; }

  const btn = document.getElementById('btnSaveEx');
  btn.disabled = true; btn.textContent = '저장 중...';

  try {
    // 사진 업로드 (있는 경우)
    let img1 = null, img2 = null;
    if (newPhoto1) img1 = await uploadExPhoto(newPhoto1, name, 1);
    if (newPhoto2) img2 = await uploadExPhoto(newPhoto2, name, 2);

    // exercises_lib에 저장
    const { data: saved, error } = await db
      .from('exercises_lib')
      .insert({
        trainer_id:  trainer.id,
        name,
        body_part:   document.getElementById('newExBody').value.trim() || null,
        category:    document.getElementById('newExCat').value.trim()  || null,
        image_url_1: img1,
        image_url_2: img2,
      })
      .select()
      .single();

    if (error) throw error;

    // 라이브러리 캐시 갱신
    myLibrary.unshift({ ...saved });

    // 현재 세션에 바로 추가
    exercises.push({
      rowId: null, exId: saved.id,
      name, bodyPart: saved.body_part || '', category: saved.category || '',
      img1, img2,
      sets: [{ set:1, weight:0, reps:10 }], comment: '',
    });
    renderExercises();
    closeNewEx();
    closeSearch();
    showToast(`'${name}' 추가됨 ✓`);
    setTimeout(() => {
      document.querySelectorAll('.ex-card').at(-1)?.scrollIntoView({ behavior:'smooth', block:'center' });
    }, 100);

  } catch(e) {
    showToast('오류: ' + e.message);
  } finally {
    btn.disabled = false; btn.textContent = '저장 후 추가';
  }
}

// 운동 사진 Supabase Storage 업로드
async function uploadExPhoto(blob, name, num) {
  const slug     = name.replace(/\s+/g, '-').replace(/[^\w가-힣-]/g, '');
  const fileName = `${trainer.id}/${slug}-${num}-${Date.now()}.webp`;
  const { error } = await db.storage
    .from('exercise-photos')
    .upload(fileName, blob, { contentType: 'image/webp', upsert: false });
  if (error) throw error;
  const { data: { publicUrl } } = db.storage.from('exercise-photos').getPublicUrl(fileName);
  return publicUrl;
}

function goBack() { history.back(); }

init();
</script>
